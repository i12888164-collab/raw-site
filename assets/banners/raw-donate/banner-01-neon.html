<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>RAW DONATE — Neon / Cyberpunk</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1600px; height:500px; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: #070710;
    color:#fff;
    position:relative;
    overflow:hidden;
  }
  .bg-grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(124,58,237,.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,.18) 1px, transparent 1px);
    background-size: 48px 48px;
    transform: perspective(420px) rotateX(60deg) scale(2.2);
    transform-origin: center 120%;
    -webkit-mask-image: radial-gradient(60% 80% at 50% 30%, #000 30%, transparent 80%);
    mask-image: radial-gradient(60% 80% at 50% 30%, #000 30%, transparent 80%);
  }
  .glow {
    position:absolute; width:900px; height:900px; left:50%; top:-300px;
    transform:translateX(-50%);
    background: radial-gradient(circle, rgba(124,58,237,.55), transparent 60%);
    filter: blur(20px);
  }
  .inner {
    position:relative; z-index:2; height:100%;
    display:flex; flex-direction:column; justify-content:center;
    padding: 0 90px;
  }
  .eyebrow {
    font-size:18px; letter-spacing:.5em; text-transform:uppercase;
    color:#c4b5fd; margin-bottom:14px;
  }
  h1 {
    font-size:128px; line-height:.92; font-weight:800; letter-spacing:-.02em;
    text-transform:uppercase; color:#fff;
    text-shadow: 0 0 18px rgba(124,58,237,.9), 0 0 42px rgba(124,58,237,.6);
  }
  h1 span { color:#a855f7; }
  .sub { margin-top:22px; font-size:26px; color:#e9d5ff; max-width:820px; }
  .cta {
    margin-top:34px; display:inline-flex; align-items:center; gap:14px;
    width:max-content; padding:18px 38px; border-radius:14px;
    background:linear-gradient(135deg,#7c3aed,#a855f7); color:#fff;
    font-size:22px; font-weight:700; text-decoration:none;
    box-shadow:0 0 30px rgba(124,58,237,.7), inset 0 0 0 1px rgba(255,255,255,.2);
  }
  .trust { position:absolute; right:80px; bottom:54px; z-index:3; display:flex; gap:14px; }
  .chip {
    text-align:center; padding:14px 20px; border-radius:12px;
    background:rgba(124,58,237,.12); border:1px solid rgba(168,85,247,.5);
    box-shadow:0 0 18px rgba(124,58,237,.35);
  }
  .chip b { display:block; font-size:26px; color:#fff; }
  .chip small { font-size:13px; letter-spacing:.15em; color:#c4b5fd; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="inner">
    <div class="eyebrow">MY SHOP · Gaming</div>
    <h1>RAW <span>DONATE</span></h1>
    <div class="sub">Пополнение игр за 1 минуту. Гарантия зачисления 100%.</div>
    <a class="cta" href="#">Выбрать игру →</a>
  </div>
  <div class="trust">
    <div class="chip"><b>24/7</b><small>Поддержка</small></div>
    <div class="chip"><b>1 мин</b><small>Зачисление</small></div>
    <div class="chip"><b>100%</b><small>Гарантия</small></div>
  </div>
</body>
</html>
